name: tests
on:
  push: {branches: [main]}
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: {python-version: '3.12', cache: pip}
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest
      - run: python run_validate.py
